<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body {
  background:#0b0f1a;
  color:white;
  text-align:center;
  font-family:Arial;
}

input, button {
  width:80%;
  padding:12px;
  margin:10px;
  border-radius:10px;
  border:none;
}

button {
  background:#6c5ce7;
  color:white;
}

img {
  width:300px;
  margin-top:20px;
  display:none;
}
</style>
</head>

<body>

<h2>🔥 AI Studio</h2>

<button onclick="logout()">Logout</button>

<input id="prompt" placeholder="اكتب وصف الصورة">

<button onclick="generate()">Generate</button>

<hr>

<h3>رفع إثبات الدفع</h3>
<input type="file" id="file">
<button onclick="sendPayment()">ارسال</button>

<img id="img">

<script>
let token = localStorage.getItem("token");

if (!token) {
  window.location.href = "/login.html";
}

async function generate() {
  const res = await fetch("/generate", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization": token
    },
    body: JSON.stringify({
      prompt: prompt.value
    })
  });

  const data = await res.json();

  if (data.error) return alert(data.error);

  img.src = data.result;
  img.style.display = "block";
}

async function sendPayment() {
  const file = document.getElementById("file").files[0];
  const reader = new FileReader();

  reader.onload = async function () {
    await fetch("/submit-payment", {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization": token
      },
      body: JSON.stringify({
        screenshot: reader.result
      })
    });

    alert("تم ارسال الدفع");
  };

  reader.readAsDataURL(file);
}

function logout() {
  localStorage.removeItem("token");
  window.location.href = "/login.html";
}
</script>

</body>
</html>
