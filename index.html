<!DOCTYPE html><html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>AI Studio</title>
  <style>
    body {
      background: #0b0f1a;
      color: white;
      font-family: Arial;
      text-align: center;
      padding-top: 50px;
    }h1 {
  font-size: 28px;
}

input {
  width: 80%;
  max-width: 400px;
  padding: 12px;
  border-radius: 8px;
  border: none;
  margin-top: 20px;
}

button {
  margin-top: 15px;
  padding: 12px 25px;
  border: none;
  border-radius: 8px;
  background: #6c5ce7;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

img {
  margin-top: 20px;
  width: 300px;
  border-radius: 10px;
  display: none;
}

.loading {
  margin-top: 15px;
  display: none;
}

  </style>
</head>
<body>  <h1>🔥 AI Studio</h1>  <input id="prompt" placeholder="اكتب وصف الصورة..." />  <br><button onclick="generateImage()Generate</button>

  <div class="loading" id="loading">⏳ جاري التوليد...</div>  <br>  <img id="result" />  <script>
    async function generateImage() {
      const prompt = document.getElementById("prompt").value;
      const img = document.getElementById("result");
      const loading = document.getElementById("loading");

      if (!prompt) {
        alert("اكتب وصف الاول");
        return;
      }

      loading.style.display = "block";
      img.style.display = "none";

      try {
        const res = await fetch("/generate", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ prompt })
        });

        const data = await res.json();

        img.src = data.result;
        img.style.display = "block";
      } catch (err) {
        alert("حصل خطأ");
      }

      loading.style.display = "none";
    }
  </script></body>
</html>
