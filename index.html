<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Studio</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 40px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 20px;
    }

    input {
      width: 80%;
      padding: 15px;
      border-radius: 10px;
      border: none;
      margin-bottom: 20px;
      font-size: 16px;
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      background: #6366f1;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }

    img {
      margin-top: 30px;
      max-width: 90%;
      border-radius: 15px;
    }
  </style>
</head>
<body>

  <h1>🔥 AI Studio</h1>

  <input id="prompt" placeholder="اكتب البرومبت هنا..." />
  <br>
  <button onclick="generate()">Generate</button>

  <div>
    <img id="result" />
  </div>

  <script>
    async function generate() {
      const prompt = document.getElementById("prompt").value;

      const res = await fetch("/generate", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ prompt })
      });

      const data = await res.json();

      document.getElementById("result").src = data.result;
    }
  </script>

</body>
</html>
