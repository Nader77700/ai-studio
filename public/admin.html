<h2>👑 Admin Panel</h2>

<div id="list"></div>

<script>
const token = localStorage.getItem("token");

async function load() {
  const res = await fetch("/admin/payments", {
    headers:{ Authorization: token }
  });

  const data = await res.json();

  list.innerHTML = "";

  data.forEach(p => {
    list.innerHTML += `
      <div style="border:1px solid white; margin:10px; padding:10px">
        <img src="${p.screenshot}" width="200"/>
        <button onclick="approve('${p._id}')">تفعيل</button>
      </div>
    `;
  });
}

async function approve(id) {
  await fetch("/admin/approve", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization": token
    },
    body: JSON.stringify({ id })
  });

  load();
}

load();
</script>
