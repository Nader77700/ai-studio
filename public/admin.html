<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body {
  background:#0b0f1a;
  color:white;
  font-family:Arial;
  text-align:center;
  margin:0;
}

/* 🔥 LOGO */
.logo {
  font-size:36px;
  font-weight:bold;
  color:gold;
  letter-spacing:4px;
  margin:20px;
  text-shadow:0 0 15px gold;
}

/* 🔥 HEADINGS */
h2 {
  margin-top:0;
}

/* TABLE */
table {
  width:95%;
  margin:auto;
  border-collapse:collapse;
  background:#111827;
  border-radius:10px;
  overflow:hidden;
}

th {
  background:#1f2937;
}

th, td {
  border:1px solid #333;
  padding:10px;
}

/* BUTTONS */
button {
  padding:6px 10px;
  margin:3px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.approve { background:green; color:white; }
.ban { background:red; color:white; }
.role { background:orange; color:white; }
.reset { background:purple; color:white; }

/* CARD */
.card {
  border:1px solid #333;
  margin:10px;
  padding:15px;
  border-radius:12px;
  background:#111827;
}

img {
  border-radius:10px;
}
</style>

</head>

<body>

<!-- 🔥 LOGO -->
<div class="logo">
  N<span style="color:white;">K</span> 👑
</div>

<h2>👑 لوحة تحكم الأدمن</h2>

<h3>👤 المستخدمين</h3>
<table id="usersTable"></table>

<hr>

<h3>💳 المدفوعات</h3>
<div id="payments"></div>

<script>
const token = localStorage.getItem("token");

if (!token) {
  window.location.href = "/login.html";
}

// ================= USERS =================
async function loadUsers() {
  const res = await fetch("/admin/users", {
    headers:{ Authorization: token }
  });

  const data = await res.json();

  usersTable.innerHTML = `
  <tr>
    <th>الاسم</th>
    <th>الإيميل</th>
    <th>الخطة</th>
    <th>الدور</th>
    <th>عدد الصور</th>
    <th>آخر دخول</th>
    <th>تحكم</th>
  </tr>
  `;

  data.forEach(u => {
    usersTable.innerHTML += `
    <tr>
      <td>${u.username}</td>
      <td>${u.email}</td>
      <td>${u.plan}</td>
      <td>${u.role}</td>
      <td>${u.imagesCount || 0}</td>
      <td>${u.lastLogin || "-"}</td>
      <td>
        <button class="ban" onclick="banUser('${u._id}')">
          ${u.isBanned ? "فك الحظر" : "حظر"}
        </button>

        <button class="role" onclick="makeAdmin('${u._id}')">
          Admin
        </button>

        <button class="reset" onclick="resetPass('${u._id}')">
          Reset
        </button>
      </td>
    </tr>
    `;
  });
}

// ================= BAN =================
async function banUser(id) {
  await fetch("/admin/ban", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization": token
    },
    body: JSON.stringify({ id })
  });

  loadUsers();
}

// ================= ROLE =================
async function makeAdmin(id) {
  await fetch("/admin/role", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization": token
    },
    body: JSON.stringify({ id, role: "admin" })
  });

  loadUsers();
}

// ================= RESET =================
async function resetPass(id) {
  const newPassword = prompt("اكتب باسورد جديد");

  if (!newPassword) return;

  await fetch("/admin/reset-password", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization": token
    },
    body: JSON.stringify({ id, newPassword })
  });

  alert("تم تغيير الباسورد");
}

// ================= PAYMENTS =================
async function loadPayments() {
  const res = await fetch("/admin/payments", {
    headers:{ Authorization: token }
  });

  const data = await res.json();

  payments.innerHTML = "";

  data.forEach(p => {
    payments.innerHTML += `
      <div class="card">
        <img src="${p.screenshot}" width="200"><br><br>
        <button class="approve" onclick="approve('${p._id}')">
          تفعيل
        </button>
      </div>
    `;
  });
}

// ================= APPROVE =================
async function approve(id) {
  await fetch("/admin/approve", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization": token
    },
    body: JSON.stringify({ id })
  });

  loadPayments();
}

// ================= INIT =================
loadUsers();
loadPayments();
</script>

</body>
</html>
