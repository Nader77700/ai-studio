<!DOCTYPE html><html lang="ar">
<head>
<meta charset="UTF-8">
<title>AI Studio</title><style>
body {
  margin:0;
  background:#0b0f1a;
  color:white;
  font-family:Arial;
}

/* ===== Layout ===== */
.container {
  display:flex;
  height:100vh;
}

/* ===== Sidebar ===== */
.sidebar {
  width:250px;
  background:#111827;
  padding:20px;
}

.logo {
  font-size:24px;
  font-weight:bold;
  color:#facc15;
  margin-bottom:20px;
}

.menu button {
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:8px;
  background:#1f2937;
  color:white;
  cursor:pointer;
}

/* ===== Chat Area ===== */
.chat {
  flex:1;
  display:flex;
  flex-direction:column;
}

.header {
  padding:15px;
  background:#111827;
  display:flex;
  justify-content:space-between;
}

.messages {
  flex:1;
  padding:20px;
  overflow-y:auto;
}

.msg {
  margin-bottom:20px;
}

.userMsg {
  text-align:right;
}

.aiMsg img {
  width:300px;
  border-radius:10px;
  margin-top:10px;
}

/* ===== Input Area ===== */
.inputArea {
  padding:15px;
  background:#111827;
}

input, textarea {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-bottom:10px;
}

button {
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.primary { background:#6c5ce7; color:white; }

/* Upload preview */
.preview img {
  width:70px;
  margin:5px;
  border-radius:8px;
}
</style></head><body><div class="container">  <!-- ===== Sidebar ===== -->  <div class="sidebar">
    <div class="logo">👑 NK AI</div><div class="menu">
  <button onclick="newChat()">🧠 محادثة جديدة</button>
  <button onclick="goImages()">🖼️ صوري</button>
  <button onclick="goFace()">🔁 تبديل الوجه</button>
  <button onclick="goAdmin()" id="adminBtn" style="display:none;">👑 Admin</button>
  <button onclick="logout()">🚪 خروج</button>
</div>

  </div>  <!-- ===== Chat ===== -->  <div class="chat"><div class="header">
  <div>مرحباً Nader 👑</div>
  <div>AI Studio</div>
</div>

<div class="messages" id="messages">

  <!-- Welcome -->
  <div class="msg aiMsg">
    <div>🔥 جاهز أعملك صور احترافية</div>
    <div>جرب:</div>
    <ul>
      <li>اعمل صورة بورتريه سينمائي</li>
      <li>صورة احترافية بإضاءة ذهبية</li>
      <li>اعمل تصميم إعلان</li>
    </ul>
  </div>

</div>

<!-- ===== Input ===== -->
<div class="inputArea">

  <textarea id="prompt" placeholder="اكتب طلبك أو ارفع صور..."></textarea>

  <!-- Upload (max 4) -->
  <input type="file" id="images" multiple accept="image/*" onchange="previewImages()">

  <div class="preview" id="preview"></div>

  <button class="primary" onclick="generate()">🚀 Generate</button>

</div>

  </div></div><script>
let token = localStorage.getItem("token");

if (!token) {
  window.location.href = "/login.html";
}

// ===== Decode JWT =====
function parseJwt(token) {
  try {
    return JSON.parse(atob(token.split('.')[1]));
  } catch {
    return null;
  }
}

const user = parseJwt(token);

// admin btn
if (user && user.role === "admin") {
  document.getElementById("adminBtn").style.display = "block";
}

// ===== Preview Images =====
function previewImages() {
  const files = document.getElementById("images").files;
  const preview = document.getElementById("preview");

  preview.innerHTML = "";

  if (files.length > 4) {
    alert("اقصى عدد 4 صور");
    return;
  }

  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      preview.innerHTML += `<img src="${e.target.result}">`;
    };
    reader.readAsDataURL(file);
  });
}

// ===== Generate =====
async function generate() {
  const prompt = document.getElementById("prompt").value;
  const files = document.getElementById("images").files;

  // add user message
  messages.innerHTML += `
    <div class="msg userMsg">${prompt}</div>
  `;

  const res = await fetch("/generate", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization": token
    },
    body: JSON.stringify({
      prompt
    })
  });

  const data = await res.json();

  if (data.error) return alert(data.error);

  messages.innerHTML += `
    <div class="msg aiMsg">
      <img src="${data.result}">
    </div>
  `;

  messages.scrollTop = messages.scrollHeight;
}

// ===== Navigation =====
function logout() {
  localStorage.removeItem("token");
  window.location.href = "/login.html";
}

function goAdmin() {
  window.location.href = "/admin.html";
}

function goFace() {
  window.location.href = "/face.html";
}

function goImages() {
  window.location.href = "/images.html";
}

function newChat() {
  messages.innerHTML = "";
}
</script></body>
</html>
