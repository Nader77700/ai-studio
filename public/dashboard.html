<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Studio</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* Layout */
.container{
  display:flex;
  height:100vh;
}

/* Sidebar */
.sidebar{
  width:230px;
  background:#020617;
  padding:15px;
  transition:.3s;
}

.logo{
  font-size:22px;
  color:#facc15;
  margin-bottom:20px;
}

.menu button{
  width:100%;
  padding:12px;
  margin:8px 0;
  background:#1e293b;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

/* Chat */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* Header */
.header{
  padding:15px;
  background:#020617;
  display:flex;
  align-items:center;
  gap:10px;
  border-bottom:1px solid #1e293b;
}

.menuToggle{
  background:none;
  border:none;
  color:white;
  font-size:22px;
  cursor:pointer;
}

/* Messages */
.messages{
  flex:1;
  padding:15px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
}

.msg{
  max-width:75%;
  padding:10px 15px;
  border-radius:15px;
  margin:10px 0;
  word-wrap:break-word;
}

.userMsg{
  background:#4f46e5;
  align-self:flex-end;
}

.aiMsg{
  background:#1e293b;
  align-self:flex-start;
}

.aiMsg img{
  width:100%;
  max-width:280px;
  border-radius:10px;
  margin-top:8px;
}

/* Input */
.inputArea{
  padding:10px;
  background:#020617;
  display:flex;
  flex-direction:column;
  gap:8px;
}

textarea{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  resize:none;
}

.primary{
  background:#6366f1;
  color:white;
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* Preview */
.preview{
  display:flex;
  gap:5px;
  flex-wrap:wrap;
}

.preview img{
  width:60px;
  border-radius:8px;
}

/* Toast */
#toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#ef4444;
  padding:12px 20px;
  border-radius:10px;
  display:none;
  animation:fade .3s;
}

@keyframes fade{
  from{opacity:0; transform:translate(-50%,20px);}
  to{opacity:1; transform:translate(-50%,0);}
}

/* Mobile */
@media(max-width:768px){
  .sidebar{
    position:fixed;
    left:-100%;
    top:0;
    height:100%;
    z-index:1000;
  }

  .sidebar.active{
    left:0;
  }
}
</style>

</head>

<body>

<div id="toast"></div>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">👑 NK AI</div>

    <div class="menu">
      <button onclick="newChat()">🧠 محادثة جديدة</button>
      <button onclick="goImages()">🖼️ صوري</button>
      <button onclick="goFace()">🔁 تبديل الوجه</button>
      <button onclick="goAdmin()" id="adminBtn" style="display:none;">👑 Admin</button>
      <button onclick="logout()">🚪 خروج</button>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat">

    <div class="header">
      <button class="menuToggle" onclick="toggleMenu()">☰</button>
      <div id="username">مرحباً 👑</div>
    </div>

    <div class="messages" id="messages">
      <div class="msg aiMsg">🔥 جاهز أعملك صور احترافية</div>
    </div>

    <!-- Input -->
    <div class="inputArea">

      <textarea id="prompt" placeholder="اكتب طلبك..."></textarea>

      <input type="file" id="images" multiple accept="image/*" onchange="previewImages()">

      <div class="preview" id="preview"></div>

      <button class="primary" onclick="generate()">🚀 Generate</button>

    </div>

  </div>

</div>

<script>
let token = localStorage.getItem("token");
if (!token) window.location.href="/login.html";

function toggleMenu(){
  document.querySelector(".sidebar").classList.toggle("active");
}

function showToast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",3000);
}

function parseJwt(token){
  try{return JSON.parse(atob(token.split('.')[1]));}
  catch{return null;}
}

const user=parseJwt(token);
if(user && user.role==="admin"){
  document.getElementById("adminBtn").style.display="block";
}

function previewImages(){
  const files=document.getElementById("images").files;
  const preview=document.getElementById("preview");

  preview.innerHTML="";

  if(files.length>4) return showToast("اقصى 4 صور");

  Array.from(files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      preview.innerHTML+=`<img src="${e.target.result}">`;
    };
    reader.readAsDataURL(file);
  });
}

function toBase64(file){
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onload=()=>res(reader.result);
    reader.onerror=rej;
    reader.readAsDataURL(file);
  });
}

async function generate(){
  const prompt=document.getElementById("prompt").value;
  const files=document.getElementById("images").files;

  let images=[];
  for(let f of files){
    images.push(await toBase64(f));
  }

  messages.innerHTML+=`
    <div class="msg userMsg">${prompt}</div>
  `;

  const res=await fetch("/generate",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":token
    },
    body:JSON.stringify({prompt,images})
  });

  const data=await res.json();

  if(data.error){
    showToast(data.error);
    return;
  }

  messages.innerHTML+=`
    <div class="msg aiMsg">
      <img src="${data.result}">
    </div>
  `;

  messages.scrollTop=messages.scrollHeight;
}

/* Navigation */
function logout(){
  localStorage.removeItem("token");
  window.location.href="/login.html";
}

function goAdmin(){window.location.href="/admin.html";}
function goFace(){window.location.href="/face.html";}
function goImages(){window.location.href="/images.html";}
function newChat(){messages.innerHTML="";}
</script>

</body>
</html>
