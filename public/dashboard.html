<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body {
  background:#0b0f1a;
  color:white;
  text-align:center;
  font-family:Arial;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:#111827;
}

.logo {
  font-size:22px;
  font-weight:bold;
  color:#facc15;
}

.user {
  font-size:14px;
}

button {
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.primary { background:#6c5ce7; color:white; }
.danger { background:red; color:white; }
.admin { background:gold; color:black; }

input {
  width:80%;
  padding:12px;
  margin:10px;
  border-radius:10px;
  border:none;
}

img {
  width:300px;
  margin-top:20px;
  display:none;
  border-radius:12px;
}

.section {
  margin-top:30px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">🔥 AI Studio</div>
  <div>
    <span class="user">Welcome Nader 👑</span>
    <button class="danger" onclick="logout()">Logout</button>
    <button id="adminBtn" class="admin" style="display:none;" onclick="goAdmin()">Admin</button>
  </div>
</div>

<div class="section">
  <h2>Generate Image</h2>

  <input id="prompt" placeholder="اكتب وصف الصورة">

  <button class="primary" onclick="generate()">Generate</button>

  <img id="img">
</div>

<hr>

<div class="section">
  <h3>💳 رفع إثبات الدفع</h3>

  <input type="file" id="file">
  <button class="primary" onclick="sendPayment()">ارسال</button>
</div>

<script>
let token = localStorage.getItem("token");

// حماية الصفحة
if (!token) {
  window.location.href = "/login.html";
}

// 🔥 فك التوكن لمعرفة الدور
function parseJwt(token) {
  try {
    return JSON.parse(atob(token.split('.')[1]));
  } catch {
    return null;
  }
}

const user = parseJwt(token);

// 👑 إظهار زرار الأدمن
if (user && user.role === "admin") {
  document.getElementById("adminBtn").style.display = "inline-block";
}

// ================= GENERATE =================
async function generate() {
  const res = await fetch("/generate", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization": token
    },
    body: JSON.stringify({
      prompt: document.getElementById("prompt").value
    })
  });

  const data = await res.json();

  if (data.error) return alert(data.error);

  img.src = data.result;
  img.style.display = "block";
}

// ================= PAYMENT =================
async function sendPayment() {
  const file = document.getElementById("file").files[0];
  const reader = new FileReader();

  reader.onload = async function () {
    await fetch("/submit-payment", {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization": token
      },
      body: JSON.stringify({
        screenshot: reader.result
      })
    });

    alert("تم ارسال الدفع");
  };

  reader.readAsDataURL(file);
}

// ================= NAV =================
function logout() {
  localStorage.removeItem("token");
  window.location.href = "/login.html";
}

function goAdmin() {
  window.location.href = "/admin.html";
}
</script>

</body>
</html>
