<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>AI Studio</title>

<style>
body {
  margin:0;
  background:#0b0f1a;
  color:white;
  font-family:Arial;
}

/* Layout */
.container {
  display:flex;
  height:100vh;
}

/* Sidebar */
.sidebar {
  width:250px;
  background:#111827;
  padding:20px;
}

.logo {
  font-size:24px;
  font-weight:bold;
  color:#facc15;
  margin-bottom:20px;
}

.menu button {
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:8px;
  background:#1f2937;
  color:white;
  cursor:pointer;
}

/* Chat */
.chat {
  flex:1;
  display:flex;
  flex-direction:column;
}

.header {
  padding:15px;
  background:#111827;
  display:flex;
  justify-content:space-between;
}

.messages {
  flex:1;
  padding:20px;
  overflow-y:auto;
}

.msg {
  margin-bottom:20px;
}

.userMsg {
  text-align:right;
}

.aiMsg img {
  width:300px;
  border-radius:10px;
  margin-top:10px;
}

/* Input */
.inputArea {
  padding:15px;
  background:#111827;
}

textarea {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-bottom:10px;
}

button {
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.primary { background:#6c5ce7; color:white; }

/* Preview */
.preview img {
  width:70px;
  margin:5px;
  border-radius:8px;
}
</style>

</head>

<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">👑 NK AI</div>

    <div class="menu">
      <button onclick="newChat()">🧠 محادثة جديدة</button>
      <button onclick="goImages()">🖼️ صوري</button>
      <button onclick="goFace()">🔁 تبديل الوجه</button>
      <button onclick="goAdmin()" id="adminBtn" style="display:none;">👑 Admin</button>
      <button onclick="logout()">🚪 خروج</button>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat">

    <div class="header">
      <div id="username">مرحباً 👑</div>
      <div>AI Studio</div>
    </div>

    <div class="messages" id="messages">

      <div class="msg aiMsg">
        <div>🔥 جاهز أعملك صور احترافية</div>
      </div>

    </div>

    <!-- Input -->
    <div class="inputArea">

      <textarea id="prompt" placeholder="اكتب طلبك أو ارفع صور..."></textarea>

      <input type="file" id="images" multiple accept="image/*" onchange="previewImages()">

      <div class="preview" id="preview"></div>

      <button class="primary" onclick="generate()">🚀 Generate</button>

    </div>

  </div>

</div>

<script>
let token = localStorage.getItem("token");

if (!token) {
  window.location.href = "/login.html";
}

// Decode JWT
function parseJwt(token) {
  try {
    return JSON.parse(atob(token.split('.')[1]));
  } catch {
    return null;
  }
}

const user = parseJwt(token);

// اسم المستخدم
if (user) {
  document.getElementById("username").innerText = "مرحباً 👑";
}

// admin button
if (user && user.role === "admin") {
  document.getElementById("adminBtn").style.display = "block";
}

// Preview images
function previewImages() {
  const files = document.getElementById("images").files;
  const preview = document.getElementById("preview");

  preview.innerHTML = "";

  if (files.length > 4) {
    alert("اقصى عدد 4 صور");
    return;
  }

  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      preview.innerHTML += `<img src="${e.target.result}">`;
    };
    reader.readAsDataURL(file);
  });
}

// Convert to base64
function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
  });
}

// Generate
async function generate() {
  const prompt = document.getElementById("prompt").value;
  const files = document.getElementById("images").files;

  let images = [];

  if (files.length > 0) {
    if (files.length > 4) {
      return alert("اقصى عدد 4 صور");
    }

    for (let file of files) {
      const base64 = await toBase64(file);
      images.push(base64);
    }
  }

  // عرض رسالة المستخدم + الصور
  let imgsHTML = images.map(img => `<img src="${img}" width="70">`).join("");

  messages.innerHTML += `
    <div class="msg userMsg">
      ${prompt}
      <div>${imgsHTML}</div>
    </div>
  `;

  const res = await fetch("/generate", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization": token
    },
    body: JSON.stringify({
      prompt,
      images
    })
  });

  const data = await res.json();

  if (data.error) return alert(data.error);

  messages.innerHTML += `
    <div class="msg aiMsg">
      <img src="${data.result}">
    </div>
  `;

  messages.scrollTop = messages.scrollHeight;
}

// Navigation
function logout() {
  localStorage.removeItem("token");
  window.location.href = "/login.html";
}

function goAdmin() {
  window.location.href = "/admin.html";
}

function goFace() {
  window.location.href = "/face.html";
}

function goImages() {
  window.location.href = "/images.html";
}

function newChat() {
  messages.innerHTML = "";
}
</script>

</body>
</html>
