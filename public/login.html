<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
body { background:#0b0f1a; color:white; text-align:center; font-family:Arial; }
input, button { width:80%; padding:12px; margin:10px; border-radius:8px; border:none; }
button { background:#6c5ce7; color:white; }
</style>
</head>

<body>

<h2>تسجيل الدخول</h2>

<input id="email" placeholder="Email">
<input id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p onclick="goRegister()" style="cursor:pointer;">إنشاء حساب</p>

<script>
async function login() {
  const res = await fetch("/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();

  if (data.error) {
    return alert(data.error);
  }

  if (!data.token) {
  console.log(data);
  return alert("في مشكلة في تسجيل الدخول");
  }
  localStorage.setItem("token", data.token);

  // 🔥 دي أهم سطر
  window.location.href = "/dashboard.html";
}

function goRegister() {
  window.location.href = "/register.html";
}
</script>
  
</body>
</html>
