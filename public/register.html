<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Register</title>
<style>
body { background:#0b0f1a; color:white; text-align:center; font-family:Arial; }
input, button { width:80%; padding:12px; margin:10px; border-radius:8px; border:none; }
button { background:#6c5ce7; color:white; }
</style>
</head>

<body>

<h2>إنشاء حساب</h2>

<input id="username" placeholder="Username">
<input id="email" placeholder="Email">
<input id="password" placeholder="Password">

<button onclick="register()">Register</button>

<p onclick="goLogin()" style="cursor:pointer;">عندك حساب؟ تسجيل دخول</p>

<script>
async function register() {
  const res = await fetch("/register", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      username: username.value,
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();

  if (data.error) return alert(data.error);

  alert("تم إنشاء الحساب");
  window.location.href = "/login.html";
}

function goLogin() {
  window.location.href = "/login.html";
}
</script>

</body>
</html>
